  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --tea-dark:   #3d2817;
      --tea-mid:    #6b4423;
      --tea-light:  #a67c52;
      --jade:       #4a7c59;
      --gold:       #c9a961;
      --cream:      #fef9f3;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cormorant Garamond','Noto Serif SC','Noto Serif Thai', serif;
      background: var(--cream);
      color: #292524;
    }

    /* ── NAV ──────────────────────────────────────── */
    .nav {
      position: fixed; top: 0; width: 100%; z-index: 999;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #e7e5e4;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    .nav-inner {
      max-width: 1280px; margin: 0 auto;
      padding: .9rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .brand { display: flex; align-items: center; gap: .6rem; }
    .brand-badge {
      width: 2.4rem; height: 2.4rem; border-radius: 50%;
      background: linear-gradient(135deg, #b45309, var(--tea-dark));
      display: flex; align-items: center; justify-content: center;
      color: #fef3c7; font-size: 1.1rem; font-family: 'Cinzel', serif;
    }
    .brand-name {
      font-family: 'Cinzel', serif; font-size: 1.35rem;
      font-weight: 600; color: #292524;
    }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a {
      text-decoration: none; color: #57534e; font-weight: 500; font-size: .95rem;
      position: relative; transition: color .25s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -3px; left: 50%; transform: translateX(-50%);
      width: 0; height: 2px; background: var(--gold); transition: width .3s;
    }
    .nav-links a:hover { color: #292524; }
    .nav-links a:hover::after { width: 100%; }

    .lang-bar {
      display: flex; gap: .25rem;
      background: #f5f5f4; padding: .25rem; border-radius: 999px;
    }
    .lang-bar button {
      padding: .35rem .9rem; border: none; border-radius: 999px;
      background: transparent; color: #78716c; font-weight: 600;
      font-size: .85rem; cursor: pointer; transition: all .25s;
      font-family: inherit;
    }
    .lang-bar button.active {
      background: white; color: #292524;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }

    /* ── HERO ─────────────────────────────────────── */
    .hero {
      min-height: 100vh; padding-top: 5rem;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      background:
        linear-gradient(135deg, rgba(61,40,23,.72) 0%, rgba(107,68,35,.62) 100%),
        repeating-linear-gradient(
          45deg,
          rgba(201,169,97,.04) 0px, rgba(201,169,97,.04) 2px,
          transparent 2px, transparent 20px
        );
      position: relative; overflow: hidden;
    }
    .hero-orb {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, rgba(201,169,97,.18), transparent);
      animation: pulse 6s ease-in-out infinite;
    }
    .hero-orb:nth-child(1){ width:500px; height:500px; top:-100px; left:-100px; animation-delay:0s; }
    .hero-orb:nth-child(2){ width:400px; height:400px; bottom:-80px; right:-80px; animation-delay:3s; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.15);opacity:1} }

    .hero-body { position: relative; z-index: 2; padding: 2rem; max-width: 56rem; animation: floatY 7s ease-in-out infinite; }
    @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }

    .hero-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 6rem; height: 6rem; border-radius: 50%;
      background: rgba(255,255,255,.12); backdrop-filter: blur(6px);
      font-size: 3rem; margin-bottom: 1.5rem;
    }
    .hero-eyebrow {
      font-family: 'Cinzel', serif;
      color: #fde68a; letter-spacing: .2em; font-size: 1rem;
      text-transform: uppercase; margin-bottom: .75rem;
    }
    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 700; color: white; line-height: 1.15; margin-bottom: 1.25rem;
    }
    .hero-sub {
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      color: #fde68a; margin-bottom: 2rem; line-height: 1.6;
    }
    .hero-cta {
      display: inline-flex; align-items: center; gap: .5rem;
      background: linear-gradient(135deg, var(--tea-mid), var(--tea-dark));
      color: white; padding: .9rem 2.4rem; border-radius: 999px;
      font-size: 1.1rem; font-weight: 600; border: none; cursor: pointer;
      box-shadow: 0 8px 32px rgba(61,40,23,.35); transition: all .3s;
      font-family: inherit;
    }
    .hero-cta:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(61,40,23,.45); }

    /* ── SECTIONS ────────────────────────────────── */
    section { padding: 5rem 1.5rem; }
    .section-inner { max-width: 1280px; margin: 0 auto; }

    .section-heading {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700; color: var(--tea-dark); text-align: center;
      margin-bottom: 1rem; position: relative; display: inline-block;
      left: 50%; transform: translateX(-50%);
    }
    .section-heading::after {
      content: ''; display: block; margin: .6rem auto 0;
      width: 60px; height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .section-lead {
      font-size: 1.2rem; color: #57534e; text-align: center;
      max-width: 44rem; margin: 0 auto 3.5rem; line-height: 1.75;
    }

    /* ── ABOUT CARDS ─────────────────────────────── */
    .about { background: white; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 1.5rem; }
    .card {
      background: linear-gradient(135deg, var(--cream), white);
      border: 1px solid #e7e5e4; border-radius: 1rem; padding: 2rem;
      text-align: center; transition: all .35s cubic-bezier(.4,0,.2,1);
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(61,40,23,.13); }
    .card-icon {
      width: 4rem; height: 4rem; border-radius: 50%; margin: 0 auto 1.25rem;
      background: linear-gradient(135deg, #d97706, #57534e);
      display: flex; align-items: center; justify-content: center; font-size: 1.9rem;
    }
    .card h3 { font-family:'Cinzel',serif; font-size:1.3rem; color:var(--tea-dark); margin-bottom:.6rem; }
    .card p  { color:#57534e; line-height:1.65; }

    /* ── MENU ────────────────────────────────────── */
    .menu-bg { background: linear-gradient(to bottom, #fafaf9, rgba(254,249,243,.7)); }
    .menu-cat-title {
      font-family:'Cinzel',serif; font-size:1.7rem; color:#57534e;
      text-align:center; margin-bottom:1.5rem;
      display:flex; align-items:center; justify-content:center; gap:.6rem;
    }
    .menu-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
      gap: 1.25rem; margin-bottom: 3.5rem;
    }
    .menu-card {
      background: linear-gradient(135deg, rgba(255,255,255,.9), rgba(255,252,245,.95));
      border: 1px solid #e7e5e4; border-radius: .875rem; padding: 1.25rem;
      transition: all .35s cubic-bezier(.4,0,.2,1);
    }
    .menu-card:hover { transform: translateY(-6px); box-shadow: 0 16px 36px rgba(61,40,23,.13); }
    .menu-card h4 { font-family:'Cinzel',serif; font-size:1.1rem; color:#292524; margin-bottom:.4rem; }
    .menu-card p  { font-size:.9rem; color:#78716c; margin-bottom:.9rem; line-height:1.5; }
    .menu-price   { font-size:1.4rem; font-weight:600; color:#b45309; }

    /* ── FORMS ───────────────────────────────────── */
    .form-wrap { background: white; }
    .form-box  { max-width: 54rem; margin: 0 auto; }
    .form-row  { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 1.25rem; }
    .field      { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1.25rem; }
    .field label { font-weight:600; color:var(--tea-mid); font-size:1.05rem; }
    .field input, .field textarea, .field select {
      padding: .75rem 1rem; border: 2px solid rgba(107,68,35,.2);
      border-radius: .6rem; font-family: inherit; font-size: 1rem;
      background: rgba(255,255,255,.85); transition: all .25s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none; border-color: var(--tea-mid);
      box-shadow: 0 0 0 4px rgba(107,68,35,.1); background: white;
    }
    .field textarea { min-height: 90px; resize: vertical; }

    .order-list {
      background: #fafaf9; border-radius: .75rem;
      padding: 1rem; max-height: 380px; overflow-y: auto;
      display: flex; flex-direction: column; gap: .75rem;
    }
    .order-row {
      display: flex; align-items: center; gap: 1rem;
      background: white; border: 1px solid #e7e5e4;
      border-radius: .6rem; padding: .85rem 1rem;
    }
    .order-row-info { flex: 1; }
    .order-row-info .name  { font-weight:600; color:#292524; font-size:.95rem; }
    .order-row-info .price { font-size:.85rem; color:#78716c; }
    .order-row input[type="number"] {
      width: 68px; text-align: center;
      padding: .45rem; border: 2px solid rgba(107,68,35,.2);
      border-radius: .5rem; font-family: inherit;
    }

    .total-bar {
      background: linear-gradient(135deg, var(--tea-mid), var(--tea-dark));
      color: white; border-radius: .75rem; padding: 1.25rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 1.5rem; font-weight: 700; margin: 1.25rem 0;
    }
    .total-bar span { color: var(--gold); }

    .btn-submit {
      width: 100%; padding: 1rem; border: none; border-radius: 999px;
      background: linear-gradient(135deg, var(--tea-mid), var(--tea-dark));
      color: white; font-size: 1.15rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      transition: all .3s; box-shadow: 0 4px 14px rgba(61,40,23,.25);
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(61,40,23,.35); }

    /* ── FOOTER ──────────────────────────────────── */
    footer {
      background: linear-gradient(135deg, #292524, #1c1917);
      color: white; padding: 3.5rem 1.5rem;
    }
    .footer-inner {
      max-width: 1280px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: 2rem;
    }
    .footer-brand { grid-column: span 2; }
    @media(max-width:640px){ .footer-brand { grid-column: span 1; } }
    .footer-logo-row {
      display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem;
    }
    .footer-badge {
      width: 2.8rem; height: 2.8rem; border-radius: 50%;
      background: linear-gradient(135deg, #d97706, #57534e);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; color: #fef3c7; font-family:'Cinzel',serif;
    }
    .footer-title { font-family:'Cinzel',serif; font-size: 1.6rem; }
    .footer-tagline { color: #fde68a; font-style: italic; }
    footer h4 { font-family:'Cinzel',serif; color: var(--gold); margin-bottom:.75rem; font-size:1.1rem; }
    footer p  { color: #d6d3d1; font-size:.95rem; margin:.35rem 0; }
    footer a  { color: #d6d3d1; text-decoration: none; }
    footer a:hover { color: var(--gold); }
    .footer-divider {
      max-width:1280px; margin: 2rem auto 0;
      border-top: 1px solid #57534e; padding-top: 1.5rem;
      text-align: center; color: #a8a29e; font-size: .9rem;
    }

    /* ── RESPONSIVE ──────────────────────────────── */
    @media(max-width:768px){
      .nav-links { display: none; }
    }
  </style>
</head>

          tea: { heading:"🍵 精品茶类", items:[
            { name:"陈年普洱（10年）",  desc:"浓郁泥土香韵，回味顺滑",     price:280 },
            { name:"凤凰山乌龙",       desc:"花香四溢，带有果香",         price:240 },
            { name:"滇红",            desc:"麦芽甜味配金毫",            price:220 },
            { name:"银针白茶",         desc:"细腻，自然清甜",            price:260 },
            { name:"茉莉龙珠",         desc:"手工绿茶配茉莉花",          price:200 },
          ]},
          food: { heading:"🥟 正宗菜肴", items:[
            { name:"过桥米线",    desc:"云南招牌米线配浓郁高汤",  price:180 },
            { name:"汽锅鸡",     desc:"传统草药炖鸡汤",         price:320 },
            { name:"鲜花饼",     desc:"玫瑰花瓣馅甜点",         price:80  },
            { name:"点心拼盘",   desc:"主厨精选6件",            price:160 },
            { name:"野生菌拼盘", desc:"当地时令菌类",           price:240 },
          ]},
        },
        order: {
          title:"下单订餐",
          name:"姓名", phone:"电话号码", email:"电子邮箱",
          address:"送货地址", items:"选择项目和数量",
          notes:"特殊说明", totalLabel:"总计",
          submit:"🛒 提交订单",
          success:"订单已收到！我们会尽快联系您。"
        },
        reserve: {
          title:"预订座位",
          name:"姓名", phone:"电话号码", email:"电子邮箱",
          date:"日期", time:"时间", guests:"人数",
          notes:"特殊要求", submit:"📅 确认预订",
          success:"预订已确认！期待您的光临。"
        },
        contact: {
          title:"访问我们",
          address:"曼谷 Silom 路 123 号 10500",
          phone:"+66 2 123 4567",
          email:"info@cloudpeaktea.com",
          hours:"每日 10:00 – 22:00"
        }
      }
    };

    /* ── APP ──────────────────────────────────────── */
    function App() {
      const [lang, setLang] = useState("en");
      const t = T[lang];
      const allItems = [...t.menu.tea.items, ...t.menu.food.items];
      const [qty, setQty] = useState({});

      const setItemQty = (name, val) =>
        setQty(q => ({ ...q, [name]: Math.max(0, parseInt(val) || 0) }));

      const total = allItems.reduce((s, item) => s + (qty[item.name] || 0) * item.price, 0);

      const scrollTo = id => document.getElementById(id)?.scrollIntoView({ behavior:"smooth" });

      const handleOrder = e => {
        e.preventDefault();
        alert(t.order.success);
        e.target.reset();
        setQty({});
      };
      const handleReserve = e => {
        e.preventDefault();
        alert(t.reserve.success);
        e.target.reset();
      };

      return (
        <>
          {/* NAV */}
          <nav className="nav">
            <div className="nav-inner">
              <div className="brand">
                <div className="brand-badge">茶</div>
                <span className="brand-name">{t.site}</span>
              </div>
              <div className="nav-links">
                {["about","menu","order","reserve"].map((id,i) => (
                  <a key={id} href={`#${id}`} onClick={e=>{e.preventDefault();scrollTo(id);}}>
                    {t.nav[i]}
                  </a>
                ))}
              </div>
              <div className="lang-bar">
                {["en","th","zh"].map(l => (
                  <button key={l} className={lang===l?"active":""} onClick={()=>setLang(l)}>
                    {l.toUpperCase()}
                  </button>
                ))}
              </div>
            </div>
          </nav>

          {/* HERO */}
          <section id="hero" className="hero">
            <div className="hero-orb" /><div className="hero-orb" />
            <div className="hero-body">
              <div className="hero-icon">🍵</div>
              <p className="hero-eyebrow">{t.hero.eyebrow}</p>
              <h1 className="hero-title">{t.site}</h1>
              <p className="hero-sub">{t.hero.sub}</p>
              <button className="hero-cta" onClick={()=>scrollTo("menu")}>
                {t.hero.cta} ▾
              </button>
            </div>
          </section>

          {/* ABOUT */}
          <section id="about" className="about">
            <div className="section-inner">
              <h2 className="section-heading">{t.about.title}</h2>
              <p className="section-lead">{t.about.lead}</p>
              <div className="cards">
                {t.about.cards.map(c => (
                  <div key={c.title} className="card">
                    <div className="card-icon">{c.icon}</div>
                    <h3>{c.title}</h3>
                    <p>{c.desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* MENU */}
          <section id="menu" className="menu-bg">
            <div className="section-inner">
              <h2 className="section-heading">{t.menu.title}</h2>
              {[t.menu.tea, t.menu.food].map(cat => (
                <div key={cat.heading}>
                  <p className="menu-cat-title">{cat.heading}</p>
                  <div className="menu-grid">
                    {cat.items.map(item => (
                      <div key={item.name} className="menu-card">
                        <h4>{item.name}</h4>
                        <p>{item.desc}</p>
                        <div className="menu-price">฿{item.price}</div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </section>

          {/* ORDER */}
          <section id="order" className="form-wrap">
            <div className="section-inner">
              <div className="form-box">
                <h2 className="section-heading">{t.order.title}</h2>
                <form onSubmit={handleOrder} style={{marginTop:"2.5rem"}}>
                  <div className="form-row">
                    <div className="field"><label>{t.order.name}</label><input type="text" required /></div>
                    <div className="field"><label>{t.order.phone}</label><input type="tel" required /></div>
                  </div>
                  <div className="field"><label>{t.order.email}</label><input type="email" required /></div>
                  <div className="field"><label>{t.order.address}</label><textarea required /></div>
                  <div className="field">
                    <label>{t.order.items}</label>
                    <div className="order-list">
                      {allItems.map(item => (
                        <div key={item.name} className="order-row">
                          <div className="order-row-info">
                            <div className="name">{item.name}</div>
                            <div className="price">฿{item.price}</div>
                          </div>
                          <input
                            type="number" min="0" max="20"
                            value={qty[item.name] || 0}
                            onChange={e => setItemQty(item.name, e.target.value)}
                          />
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="total-bar">
                    <span>{t.order.totalLabel}</span>
                    <span>฿{total}</span>
                  </div>
                  <div className="field"><label>{t.order.notes}</label><textarea /></div>
                  <button type="submit" className="btn-submit">{t.order.submit}</button>
                </form>
              </div>
            </div>
          </section>

          {/* RESERVE */}
          <section id="reserve" className="menu-bg">
            <div className="section-inner">
              <div className="form-box">
                <h2 className="section-heading">{t.reserve.title}</h2>
                <form onSubmit={handleReserve} style={{marginTop:"2.5rem"}}>
                  <div className="form-row">
                    <div className="field"><label>{t.reserve.name}</label><input type="text" required /></div>
                    <div className="field"><label>{t.reserve.phone}</label><input type="tel" required /></div>
                  </div>
                  <div className="field"><label>{t.reserve.email}</label><input type="email" required /></div>
                  <div className="form-row">
                    <div className="field"><label>{t.reserve.date}</label><input type="date" required /></div>
                    <div className="field"><label>{t.reserve.time}</label><input type="time" required /></div>
                    <div className="field"><label>{t.reserve.guests}</label><input type="number" min="1" max="20" defaultValue="2" required /></div>
                  </div>
                  <div className="field"><label>{t.reserve.notes}</label><textarea /></div>
                  <button type="submit" className="btn-submit">{t.reserve.submit}</button>
                </form>
              </div>
            </div>
          </section>

          {/* FOOTER */}
          <footer>
            <div className="footer-inner">
              <div className="footer-brand">
                <div className="footer-logo-row">
                  <div className="footer-badge">茶</div>
                  <span className="footer-title">{t.site}</span>
                </div>
                <p className="footer-tagline">{t.tagline}</p>
              </div>
              <div>
                <h4>{t.contact.title}</h4>
                <p>📍 {t.contact.address}</p>
                <p>📞 {t.contact.phone}</p>
                <p>✉️ {t.contact.email}</p>
                <p>🕐 {t.contact.hours}</p>

              </div>
              <div>
                <h4>Links</h4>
                {["about","menu","order","reserve"].map((id,i) => (
                  <p key={id}><a href={`#${id}`} onClick={e=>{e.preventDefault();scrollTo(id);}}>{t.nav[i]}</a></p>
                ))}
              </div>
            </div>
            <div className="footer-divider">
              © 2026 {t.site} · All rights reserved
            </div>
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
